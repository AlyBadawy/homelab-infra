- name: Restore Longhorn volumes from backups (GitOps-ready)
  hosts: homelab

  vars:
    longhorn_namespace: "longhorn-system"
    backup_store_path: "/mnt/nas/backups/longhorn/backupstore"
    nas_ip: "172.20.20.2"
    nas_backup_path: "/var/nfs/backups/longhorn/backupstore"

  tasks:
    # ────────────────────────────────────────────────────────────────────────────
    # Discover available backups
    # ────────────────────────────────────────────────────────────────────────────
    - name: Scan NAS for available backups
      shell: |
        for vol_dir in {{ backup_store_path }}/volumes/*/; do
          vol_id=$(basename "$vol_dir")
          metadata_file=$(find "$vol_dir" -type f ! -name '.DS_Store' 2>/dev/null | head -1)
          if [ -f "$metadata_file" ]; then
            vol_name=$(grep -o 'pvcName[^,}]*' "$metadata_file" 2>/dev/null | cut -d':' -f2 | sed 's/[\\"]//g' | tr -d ' ' | head -1)
            vol_name="${vol_name:-$vol_id}"
            # Get latest backup
            latest=$(ls -t1 "$vol_dir" 2>/dev/null | grep -v '^\.' | head -1)
            [ -n "$latest" ] && echo "$vol_id|$vol_name|$latest"
          fi
        done
      register: backup_scan
      changed_when: false

    - name: Parse discovered backups
      set_fact:
        available_backups: "{{ backup_scan.stdout_lines | map('split', '|') | list }}"

    - name: Show discovered backups
      debug:
        msg: |
          Found {{ available_backups | length }} backup(s):
          {% for backup in available_backups %}
          - {{ backup[1] }} (ID: {{ backup[0] }}, backup: {{ backup[2][:12] }})
          {% endfor %}

    # ────────────────────────────────────────────────────────────────────────────
    # Ask user which to restore
    # ────────────────────────────────────────────────────────────────────────────
    - name: Prompt for volumes to restore
      pause:
        prompt: |

          Which volumes should be restored before GitOps deployment?
          {% for backup in available_backups %}
          - {{ backup[1] }}
          {% endfor %}

          Enter PVC names (comma-separated), "all", or leave blank to skip:
      register: restore_input
      when: available_backups | length > 0

    - name: Parse selection
      set_fact:
        user_choice: "{{ restore_input.user_input | default('') | lower | trim }}"
      when: available_backups | length > 0

    - name: Select all backups if requested
      set_fact:
        selected_backups: "{{ available_backups }}"
      when:
        - available_backups | length > 0
        - user_choice == "all"

    - name: Select specific backups
      set_fact:
        selected_backups: |
          [
          {% set selections = user_choice.split(',') %}
          {% for backup in available_backups %}
            {% for sel in selections %}
              {% if sel.strip() == backup[1] or sel.strip() == backup[0] %}
                {{ backup | tojson }},
              {% endif %}
            {% endfor %}
          {% endfor %}
          ]
      when:
        - available_backups | length > 0
        - user_choice != "all"
        - user_choice != ""

    - name: No volumes selected
      set_fact:
        selected_backups: []
      when:
        - available_backups | length > 0
        - user_choice == ""

    - name: Display selection
      debug:
        msg: |
          Will restore {{ selected_backups | length }} volume(s):
          {% for backup in selected_backups %}
          - {{ backup[1] }}
          {% endfor %}
      when: selected_backups | length > 0

    # ────────────────────────────────────────────────────────────────────────────
    # Restore volumes directly
    # ────────────────────────────────────────────────────────────────────────────
    - name: Restore each volume
      become: true
      shell: |
        vol_id="{{ item[0] }}"
        vol_name="{{ item[1] }}"

        # Create Volume manifest
        kubectl apply -f - <<MANIFEST
        apiVersion: longhorn.io/v1beta1
        kind: Volume
        metadata:
          name: $vol_name
          namespace: {{ longhorn_namespace }}
        spec:
          size: 1073741824
          numberOfReplicas: 1
          dataLocality: disabled
          encrypted: false
          frontend: blockdev
          staleReplicaTimeout: 2880
        MANIFEST

        echo "Created volume: $vol_name"
      loop: "{{ selected_backups }}"
      when: selected_backups | length > 0
      environment:
        KUBECONFIG: /etc/rancher/k3s/k3s.yaml

    - name: Check volume states
      become: true
      shell: |
        kubectl get volumes -n {{ longhorn_namespace }} -o wide
      environment:
        KUBECONFIG: /etc/rancher/k3s/k3s.yaml
      register: volume_states
      changed_when: false

    - name: Display volume states
      debug:
        msg: "{{ volume_states.stdout_lines }}"

    - name: Wait for volumes to be ready
      become: true
      shell: |
        state=$(kubectl get volume "{{ item[1] }}" -n {{ longhorn_namespace }} -o jsonpath='{.status.state}' 2>/dev/null)
        echo "$state"
      register: vol_state
      until: vol_state.stdout != "" and vol_state.stdout != "creating" and vol_state.stdout != "pending"
      retries: 60
      delay: 3
      loop: "{{ selected_backups }}"
      when: selected_backups | length > 0
      environment:
        KUBECONFIG: /etc/rancher/k3s/k3s.yaml
      changed_when: false

    - name: Create PVCs for restored volumes
      become: true
      shell: |
        vol_name="{{ item[1] }}"
        kubectl apply -f - <<MANIFEST
        apiVersion: v1
        kind: PersistentVolumeClaim
        metadata:
          name: $vol_name
          namespace: default
        spec:
          accessModes:
            - ReadWriteOnce
          resources:
            requests:
              storage: 1Gi
          volumeName: $vol_name
          storageClassName: longhorn
        MANIFEST

        echo "Created PVC: $vol_name"
      loop: "{{ selected_backups }}"
      when: selected_backups | length > 0
      environment:
        KUBECONFIG: /etc/rancher/k3s/k3s.yaml

    - name: Wait for PVCs to bind
      become: true
      shell: |
        kubectl get pvc "{{ item[1] }}" -n default -o jsonpath='{.status.phase}'
      register: pvc_state
      until: pvc_state.stdout == "Bound"
      retries: 30
      delay: 2
      loop: "{{ selected_backups }}"
      when: selected_backups | length > 0
      environment:
        KUBECONFIG: /etc/rancher/k3s/k3s.yaml
      changed_when: false

    # ────────────────────────────────────────────────────────────────────────────
    # Verify restore
    # ────────────────────────────────────────────────────────────────────────────
    - name: Verify restored volumes
      become: true
      shell: |
        echo "Restored Volumes:"
        kubectl get volumes -n {{ longhorn_namespace }} --sort-by=.metadata.creationTimestamp | tail -{{ selected_backups | length }}
        echo ""
        echo "Restored PVCs:"
        kubectl get pvc -n default -o wide | grep -E "{% for b in selected_backups %}{{ b[1] }}{% if not loop.last %}|{% endif %}{% endfor %}"
      environment:
        KUBECONFIG: /etc/rancher/k3s/k3s.yaml
      register: verify_result
      when: selected_backups | length > 0
      changed_when: false

    - name: Display verification
      debug:
        msg: "{{ verify_result.stdout_lines }}"
      when: selected_backups | length > 0

    - name: Summary
      debug:
        msg: |
          ═══════════════════════════════════════════════════════════════
          Longhorn Restore Summary
          ═══════════════════════════════════════════════════════════════

          ✓ Restored {{ selected_backups | length }} volume(s)
          ✓ All volumes ready for GitOps deployment

          You can now:
          1. Deploy ArgoCD with your applications
          2. Applications will immediately access restored data
          3. Monitor with: kubectl get volumes -n {{ longhorn_namespace }}

          Next step: ansible-playbook -i ansible/inventory.ini argocd.yml
          ═══════════════════════════════════════════════════════════════
      when: selected_backups | length > 0
