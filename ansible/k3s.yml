- name: Install k3s, Helm, and Longhorn
  hosts: homelab

  vars:
    k3s_version: "" # Leave empty for latest, or set to specific version (e.g., "v1.28.0")
    helm_version: "" # Leave empty for latest, or set to specific version (e.g., "v3.13.0")
    longhorn_version: "" # Leave empty for latest, or set to specific version (e.g., "1.5.0")
    longhorn_namespace: "longhorn-system"

  tasks:
    # ────────────────────────────────────────────────────────────────────────────
    # Install k3s
    # ────────────────────────────────────────────────────────────────────────────
    - name: Check if k3s is already installed
      stat:
        path: /usr/local/bin/k3s
      register: k3s_installed

    - name: Test connectivity to k3s repository
      command: curl -I https://get.k3s.io
      register: k3s_repo_check
      failed_when: false
      changed_when: false

    - name: Install k3s
      become: true
      shell: |
        curl -sfL https://get.k3s.io | sh -s - \
          --disable traefik \
          --write-kubeconfig-mode 644
      when: not k3s_installed.stat.exists
      environment:
        INSTALL_K3S_VERSION: "{{ k3s_version if k3s_version else '' }}"
      register: k3s_install
      failed_when: k3s_install.rc != 0

    - name: Wait for k3s to be ready
      become: true
      command: kubectl get nodes
      register: k3s_ready
      until: k3s_ready.rc == 0
      retries: 30
      delay: 10
      environment:
        KUBECONFIG: /etc/rancher/k3s/k3s.yaml

    - name: Get k3s kubeconfig
      become: true
      slurp:
        src: /etc/rancher/k3s/k3s.yaml
      register: k3s_kubeconfig

    - name: Save kubeconfig to ansible control node
      copy:
        content: "{{ k3s_kubeconfig['content'] | b64decode }}"
        dest: "{{ lookup('env', 'HOME') }}/.kube/k3s-config.yaml"
        mode: "0600"
      delegate_to: localhost
      become: no
      run_once: true

    - name: Display kubeconfig location
      debug:
        msg: "kubeconfig saved to: {{ lookup('env', 'HOME') }}/.kube/k3s-config.yaml"

    # ────────────────────────────────────────────────────────────────────────────
    # Install Helm
    # ────────────────────────────────────────────────────────────────────────────
    - name: Check if Helm is already installed
      command: helm version
      register: helm_installed
      failed_when: false
      changed_when: false

    - name: Install Helm
      become: true
      shell: |
        curl https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash
      when: helm_installed.rc != 0
      environment:
        HELM_INSTALL_DIR: /usr/local/bin

    - name: Verify Helm installation
      command: helm version
      environment:
        KUBECONFIG: /etc/rancher/k3s/k3s.yaml
      changed_when: false

    # ────────────────────────────────────────────────────────────────────────────
    # Configure kubeconfig for user access
    # ────────────────────────────────────────────────────────────────────────────
    - name: Create .kube directory
      file:
        path: "{{ ansible_facts['env']['HOME'] }}/.kube"
        state: directory
        mode: "0700"

    - name: Fix k3s kubeconfig permissions
      become: true
      file:
        path: /etc/rancher/k3s/k3s.yaml
        mode: "0644"

    - name: Copy kubeconfig to user home (without sudo)
      become: true
      become_user: "{{ ansible_user }}"
      copy:
        src: /etc/rancher/k3s/k3s.yaml
        dest: "~/.kube/config"
        mode: "0600"
        remote_src: yes

    - name: Add KUBECONFIG to shell profile
      become: true
      become_user: "{{ ansible_user }}"
      lineinfile:
        path: "~/.bashrc"
        line: "export KUBECONFIG=$HOME/.kube/config"
        regexp: "^export KUBECONFIG"
        state: present

    - name: Verify kubectl works without sudo
      become: true
      become_user: "{{ ansible_user }}"
      shell: |
        export KUBECONFIG=$HOME/.kube/config
        kubectl get nodes
      changed_when: false

    - name: Display kubeconfig ready
      debug:
        msg: |
          ✓ kubectl is ready without sudo
          ✓ kubeconfig: ~/.kube/config
          ✓ KUBECONFIG env var added to ~/.bashrc
          Run: source ~/.bashrc (or login again)

    # ────────────────────────────────────────────────────────────────────────────
    # Configure Helm repositories
    # ────────────────────────────────────────────────────────────────────────────
    - name: Add Helm repositories
      command: "helm repo add {{ item.name }} {{ item.url }}"
      environment:
        KUBECONFIG: "{{ ansible_facts['env']['HOME'] }}/.kube/config"
      register: helm_repo_add
      failed_when: false
      changed_when: "'already exists' not in helm_repo_add.stdout"
      loop:
        - name: ingress-nginx
          url: https://kubernetes.github.io/ingress-nginx
        - name: prometheus-community
          url: https://prometheus-community.github.io/helm-charts
        - name: longhorn
          url: https://charts.longhorn.io
        - name: argo
          url: https://argoproj.github.io/argo-helm

    - name: Update Helm repositories
      command: helm repo update
      environment:
        KUBECONFIG: "{{ ansible_facts['env']['HOME'] }}/.kube/config"
      changed_when: false

    - name: Display Helm repositories
      command: helm repo list
      environment:
        KUBECONFIG: "{{ ansible_facts['env']['HOME'] }}/.kube/config"
      register: helm_repos
      changed_when: false

    - name: Show Helm repos
      debug:
        msg: "{{ helm_repos.stdout_lines }}"

    # ────────────────────────────────────────────────────────────────────────────
    # Longhorn Installation
    # ────────────────────────────────────────────────────────────────────────────
    # NOTE: Longhorn is NOT installed here. It is managed by ArgoCD via the
    # infra-longhorn Application (k8s/argocd/apps/infra-longhorn.yaml).
    # This avoids conflicts when ArgoCD takes over Helm release management.
    # Longhorn will be installed automatically when ArgoCD syncs.

    # ────────────────────────────────────────────────────────────────────────────
    # Verification
    # ────────────────────────────────────────────────────────────────────────────
    - name: Get cluster nodes
      become: true
      command: kubectl get nodes -o wide
      environment:
        KUBECONFIG: /etc/rancher/k3s/k3s.yaml
      register: k3s_nodes
      changed_when: false

    - name: Display cluster nodes
      debug:
        msg: "{{ k3s_nodes.stdout }}"

    - name: Summary
      debug:
        msg:
          - "✓ k3s installed (without Traefik)"
          - "✓ Helm installed"
          - "✓ Ready for ArgoCD deployment"
          - ""
          - "Next steps:"
          - "1. Run: ansible-playbook -i ansible/inventory.ini ansible/apply-secrets.yml"
          - "2. Run: ansible-playbook -i ansible/inventory.ini ansible/argocd-bootstrap.yml"
          - "3. ArgoCD will install Longhorn via infra-longhorn Application"
