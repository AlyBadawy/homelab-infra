- name: Discover and automatically restore Longhorn backups
  hosts: homelab

  vars:
    longhorn_namespace: "longhorn-system"
    backup_store_path: "/mnt/nas/backups/longhorn/backupstore"
    nas_ip: "172.20.20.2"
    nas_backup_path: "/var/nfs/backups/longhorn/backupstore"

  tasks:
    # ────────────────────────────────────────────────────────────────────────────
    # Discover available backups
    # ────────────────────────────────────────────────────────────────────────────
    - name: List backup volume directories
      shell: |
        find {{ backup_store_path }}/volumes -maxdepth 1 -type d ! -name 'volumes' ! -name '.DS_Store' | sort
      register: backup_volumes
      changed_when: false

    - name: Read backup metadata for each volume
      shell: |
        for vol_dir in {{ backup_store_path }}/volumes/*/; do
          vol_id=$(basename "$vol_dir")
          metadata_file=$(find "$vol_dir" -type f | head -1)
          if [ -f "$metadata_file" ]; then
            vol_name=$(grep -o 'pvcName[^,}]*' "$metadata_file" | cut -d':' -f2 | sed 's/[\\"]//g' | tr -d ' ' | head -1)
            vol_name="${vol_name:-$vol_id}"
          else
            vol_name="$vol_id"
          fi
          [ -n "$vol_name" ] && echo "$vol_id|$vol_name"
        done
      register: backup_metadata
      changed_when: false

    - name: Parse backup volumes with names
      set_fact:
        discovered_backups: "{{ backup_metadata.stdout_lines | map('split', '|') | list }}"

    - name: Display discovered backups
      debug:
        msg: |
          Discovered {{ discovered_backups | length }} volume backup(s):
          {% for backup in discovered_backups %}
          - PVC: {{ backup[1] | default(backup[0]) }} (ID: {{ backup[0] }})
          {% endfor %}

    # ────────────────────────────────────────────────────────────────────────────
    # Prompt user for volumes to restore
    # ────────────────────────────────────────────────────────────────────────────
    - name: Prompt for volumes to restore
      pause:
        prompt: |

          Available volumes to restore:
          {% for backup in discovered_backups %}
          - {{ backup[1] | default(backup[0]) }}
          {% endfor %}

          Enter PVC names or IDs to restore (comma-separated), type "all" to restore all, or leave blank to skip:
          Example: postgres-data-lh,nextcloud-data-lh
          Or:      all
      register: restore_prompt
      when: discovered_backups | length > 0

    - name: Parse restore selection
      set_fact:
        user_restore_input: "{{ restore_prompt.user_input | default('') | lower }}"
      when: discovered_backups | length > 0

    - name: Determine volumes to restore (all)
      set_fact:
        volumes_to_restore: "{{ discovered_backups | map(attribute='0') | list }}"
      when:
        - discovered_backups | length > 0
        - user_restore_input == "all"

    - name: Determine volumes to restore (selected)
      set_fact:
        volumes_to_restore: |
          [
          {% set selections = user_restore_input.split(',') %}
          {% for backup in discovered_backups %}
            {% for selection in selections %}
              {% if selection.strip() == backup[1] or selection.strip() == backup[0] %}
                "{{ backup[0] }}",
              {% endif %}
            {% endfor %}
          {% endfor %}
          ]
      when:
        - discovered_backups | length > 0
        - user_restore_input != "all"
        - user_restore_input != ""

    - name: Display selected volumes
      debug:
        msg: |
          Selected {{ volumes_to_restore | length }} volume(s) to restore:
          {% for backup_id in volumes_to_restore %}
            {% set backup_info = discovered_backups | selectattr('0', 'equalto', backup_id) | first %}
            - {{ backup_info[1] }} (ID: {{ backup_id }})
          {% endfor %}
      when: volumes_to_restore | length > 0

    - name: Skip restore if no volumes selected
      debug:
        msg: "No volumes selected for restore. Skipping."
      when: volumes_to_restore | length == 0

    # ────────────────────────────────────────────────────────────────────────────
    # Find latest backups for selected volumes
    # ────────────────────────────────────────────────────────────────────────────
    - name: Find latest backups for selected volumes
      shell: |
        for vol_id in {{ volumes_to_restore | join(' ') }}; do
          vol_dir="{{ backup_store_path }}/volumes/$vol_id"
          # Find the latest backup (most recent by modification time)
          latest_backup=$(find "$vol_dir" -type d -mindepth 1 | xargs ls -td | head -1 | xargs basename)
          if [ -z "$latest_backup" ]; then
            latest_backup=$(ls -1 "$vol_dir" | grep -v '^\.' | head -1)
          fi
          echo "$vol_id|$latest_backup"
        done
      register: latest_backups
      when: volumes_to_restore | length > 0
      changed_when: false

    - name: Parse latest backups
      set_fact:
        backups_to_restore: "{{ latest_backups.stdout_lines | map('split', '|') | list }}"
      when: volumes_to_restore | length > 0

    # ────────────────────────────────────────────────────────────────────────────
    # Create Longhorn Restore objects
    # ────────────────────────────────────────────────────────────────────────────
    - name: Create Longhorn Restore for each backup
      become: true
      shell: |
        vol_id="{{ item[0] }}"
        backup_id="{{ item[1] }}"
        vol_name=$(grep -l "pvcName.*$vol_id\|$backup_id" {{ backup_store_path }}/volumes/$vol_id/* 2>/dev/null | head -1 | xargs grep -o 'pvcName[^,}]*' | cut -d':' -f2 | sed 's/[\\"]//g' | tr -d ' ')
        vol_name="${vol_name:-restored-$vol_id}"

        kubectl apply -f - <<EOF
        apiVersion: longhorn.io/v1beta1
        kind: Volume
        metadata:
          name: restored-$vol_id
          namespace: {{ longhorn_namespace }}
        spec:
          size: 1073741824
          restoreVolumeRecurringJob: disabled
          fromBackup: "nfs://{{ nas_ip }}:{{ nas_backup_path }}/volumes/$vol_id/$backup_id"
          dataLocality: disabled
          revisionCounterDisabled: false
          numberOfReplicas: 1
          staleReplicaTimeout: 2880
          unmapMarkSnapChainRemoved: ignored
        EOF
      environment:
        KUBECONFIG: /etc/rancher/k3s/k3s.yaml
      loop: "{{ backups_to_restore }}"
      when: volumes_to_restore | length > 0
      register: restore_creation
      changed_when: "'created' in restore_creation.stdout"

    - name: Wait for restored volumes to be ready
      become: true
      shell: |
        kubectl get volume restored-{{ item[0] }} -n {{ longhorn_namespace }} -o jsonpath='{.status.state}'
      environment:
        KUBECONFIG: /etc/rancher/k3s/k3s.yaml
      register: volume_state
      until: volume_state.stdout == "attached" or volume_state.stdout == "detached"
      retries: 30
      delay: 10
      loop: "{{ backups_to_restore }}"
      when: volumes_to_restore | length > 0
      changed_when: false

    # ────────────────────────────────────────────────────────────────────────────
    # Create PVCs for restored volumes
    # ────────────────────────────────────────────────────────────────────────────
    - name: Create PVCs for restored volumes
      become: true
      shell: |
        vol_id="{{ item[0] }}"
        vol_name=$(grep -l "pvcName" {{ backup_store_path }}/volumes/$vol_id/* 2>/dev/null | head -1 | xargs grep -o 'pvcName[^,}]*' | cut -d':' -f2 | sed 's/[\\"]//g' | tr -d ' ')
        vol_name="${vol_name:-restored-$vol_id}"

        kubectl apply -f - <<EOF
        apiVersion: v1
        kind: PersistentVolumeClaim
        metadata:
          name: $vol_name
          namespace: default
        spec:
          accessModes:
            - ReadWriteOnce
          resources:
            requests:
              storage: 1Gi
          volumeName: restored-$vol_id
          storageClassName: longhorn
        EOF
      environment:
        KUBECONFIG: /etc/rancher/k3s/k3s.yaml
      loop: "{{ backups_to_restore }}"
      when: volumes_to_restore | length > 0
      register: pvc_creation
      changed_when: "'created' in pvc_creation.stdout"

    - name: Wait for PVCs to be bound
      become: true
      shell: |
        kubectl get pvc -n default -o jsonpath='{range .items[?(@.spec.volumeName=="restored-{{ item[0] }}")]}{ .status.phase}{\n}{end}'
      environment:
        KUBECONFIG: /etc/rancher/k3s/k3s.yaml
      register: pvc_phase
      until: pvc_phase.stdout == "Bound"
      retries: 20
      delay: 5
      loop: "{{ backups_to_restore }}"
      when: volumes_to_restore | length > 0
      changed_when: false

    # ────────────────────────────────────────────────────────────────────────────
    # Verify restored volumes
    # ────────────────────────────────────────────────────────────────────────────
    - name: Display restored volumes
      become: true
      shell: |
        kubectl get volumes -n {{ longhorn_namespace }} -o wide | grep restored
      environment:
        KUBECONFIG: /etc/rancher/k3s/k3s.yaml
      register: restored_volumes
      changed_when: false
      when: volumes_to_restore | length > 0

    - name: Display restored PVCs
      debug:
        msg: "{{ restored_volumes.stdout_lines }}"
      when: volumes_to_restore | length > 0

    - name: Summary
      debug:
        msg:
          - "✓ Restored {{ volumes_to_restore | length }} volume(s)"
          - "✓ Created PVCs for restored volumes"
          - "✓ All volumes ready for use"
      when: volumes_to_restore | length > 0
