- name: Apply Kubernetes secrets and cluster configuration
  hosts: homelab

  vars:
    secrets_file_path: "/mnt/nas/homelab/secrets.yaml"
    kubeconfig_path: "/etc/rancher/k3s/k3s.yaml"
    longhorn_namespace: "longhorn-system"
    domain: "in.alybadawy.com"
    # Default cluster variables (override in group_vars or via CLI)
    cluster_config:
      DOMAIN: "{{ domain }}"
      GITHUB_REPO: "{{ github_repo | default('') }}"
      NAS_IP: "{{ nas_ip | default('172.20.20.2') }}"
      NAS_BASE_EXPORT: "{{ nas_base_export | default('/var/nfs') }}"
      NAS_IMMICH_DATA: "{{ nas_immich_data | default('') }}"
      NAS_NEXTCLOUD_DATA: "{{ nas_nextcloud_data | default('') }}"
      NAS_BACKUPS_DIR: "{{ nas_backups_dir | default('') }}"
      TIMEZONE: "{{ timezone | default('UTC') }}"
      CFG_SUB_WHOAMI: "{{ sub_whoami | default('whoami') }}"
      CFG_SUB_GRAFANA: "{{ sub_grafana | default('grafana') }}"
      CFG_SUB_PROMETHEUS: "{{ sub_prometheus | default('prometheus') }}"
      CFG_SUB_ALERTMANAGER: "{{ sub_alertmanager | default('alerts') }}"
      CFG_SUB_PGADMIN: "{{ sub_pgadmin | default('pgadmin') }}"
      CFG_SUB_AUTHENTIK: "{{ sub_authentik | default('auth') }}"
      CFG_SUB_NEXTCLOUD: "{{ sub_nextcloud | default('cloud') }}"
      CFG_SUB_IMMICH: "{{ sub_immich | default('photos') }}"
      CFG_SUB_ARGOCD: "{{ sub_argocd | default('argocd') }}"
      CFG_SUB_LONGHORN: "{{ sub_longhorn | default('longhorn') }}"

  tasks:
    # ────────────────────────────────────────────────────────────────────────────
    # Check if secrets file exists
    # ────────────────────────────────────────────────────────────────────────────
    - name: Check if secrets file exists on NAS
      stat:
        path: "{{ secrets_file_path }}"
      register: secrets_file_stat

    - name: Fail if secrets file not found
      fail:
        msg: "Secrets file not found at {{ secrets_file_path }}"
      when: not secrets_file_stat.stat.exists

    # ────────────────────────────────────────────────────────────────────────────
    # Extract and create namespaces
    # ────────────────────────────────────────────────────────────────────────────
    - name: Extract unique namespaces from secrets file
      become: true
      shell: |
        python3 << 'PYEOF'
        import yaml
        import sys

        try:
            with open("{{ secrets_file_path }}") as f:
                config = yaml.safe_load(f) or {}

            namespaces = set()

            # Extract namespaces from secrets
            for secret in config.get("secrets", []):
                ns = secret.get("namespace", "default")
                if ns:
                    namespaces.add(ns)

            # Always include argocd namespace for cluster-vars ConfigMap
            namespaces.add("argocd")

            for ns in sorted(namespaces):
                print(ns)
        except Exception as e:
            print(f"Error: {e}", file=sys.stderr)
            sys.exit(1)
        PYEOF
      register: namespaces_output
      changed_when: false

    - name: Parse discovered namespaces
      set_fact:
        required_namespaces: "{{ namespaces_output.stdout_lines }}"

    - name: Display discovered namespaces
      debug:
        msg: |
          Discovered {{ required_namespaces | length }} namespace(s):
          {% for ns in required_namespaces %}
          - {{ ns }}
          {% endfor %}

    - name: Create namespaces
      become: true
      shell: |
        kubectl create namespace "{{ item }}" \
          --dry-run=client -o yaml | kubectl apply -f -
      environment:
        KUBECONFIG: "{{ kubeconfig_path }}"
      loop: "{{ required_namespaces }}"
      register: namespace_creation
      changed_when: "'namespace' in namespace_creation.stdout"

    # ────────────────────────────────────────────────────────────────────────────
    # Generate and apply Secret manifests
    # ────────────────────────────────────────────────────────────────────────────
    - name: Generate Secret manifests from secrets file
      become: true
      shell: |
        python3 << 'PYEOF'
        import yaml
        import base64
        import sys

        try:
            with open("{{ secrets_file_path }}") as f:
                config = yaml.safe_load(f) or {}

            for secret in config.get("secrets", []):
                name = secret.get("name", "")
                namespace = secret.get("namespace", "default")
                data = secret.get("data", {})

                if not name or not data:
                    continue

                manifest = {
                    "apiVersion": "v1",
                    "kind": "Secret",
                    "metadata": {
                        "name": name,
                        "namespace": namespace
                    },
                    "type": "Opaque",
                    "data": {
                        k: base64.b64encode(str(v).encode()).decode()
                        for k, v in data.items()
                    }
                }

                print("---")
                print(yaml.dump(manifest, default_flow_style=False), end="")
        except Exception as e:
            print(f"Error: {e}", file=sys.stderr)
            sys.exit(1)
        PYEOF
      register: secrets_manifests
      changed_when: false

    - name: Write Secret manifests to file
      copy:
        content: "{{ secrets_manifests.stdout }}"
        dest: /tmp/secrets-manifest.yaml
      when: secrets_manifests.stdout | length > 0

    - name: Apply Secret manifests
      become: true
      shell: kubectl apply -f /tmp/secrets-manifest.yaml
      environment:
        KUBECONFIG: "{{ kubeconfig_path }}"
      when: secrets_manifests.stdout | length > 0
      register: secrets_apply
      changed_when: "'secret' in secrets_apply.stdout.lower()"

    - name: Display applied secrets
      debug:
        msg: "{{ secrets_apply.stdout_lines }}"
      when: secrets_manifests.stdout | length > 0

    # ────────────────────────────────────────────────────────────────────────────
    # Create cluster-vars ConfigMap for ArgoCD
    # ────────────────────────────────────────────────────────────────────────────
    - name: Create cluster-vars ConfigMap manifest
      become: true
      shell: |
        cat << 'MANIFEST'
        apiVersion: v1
        kind: ConfigMap
        metadata:
          name: cluster-vars
          namespace: argocd
        data:
          DOMAIN: "{{ cluster_config.DOMAIN }}"
          GITHUB_REPO: "{{ cluster_config.GITHUB_REPO }}"
          WILDCARD_SECRET: "wildcard-{{ cluster_config.DOMAIN | replace('.', '-') }}"
          WHOAMI_HOST: "{{ cluster_config.CFG_SUB_WHOAMI }}.{{ cluster_config.DOMAIN }}"
          GRAFANA_HOST: "{{ cluster_config.CFG_SUB_GRAFANA }}.{{ cluster_config.DOMAIN }}"
          PROMETHEUS_HOST: "{{ cluster_config.CFG_SUB_PROMETHEUS }}.{{ cluster_config.DOMAIN }}"
          ALERTMANAGER_HOST: "{{ cluster_config.CFG_SUB_ALERTMANAGER }}.{{ cluster_config.DOMAIN }}"
          PGADMIN_HOST: "{{ cluster_config.CFG_SUB_PGADMIN }}.{{ cluster_config.DOMAIN }}"
          AUTHENTIK_HOST: "{{ cluster_config.CFG_SUB_AUTHENTIK }}.{{ cluster_config.DOMAIN }}"
          NEXTCLOUD_HOST: "{{ cluster_config.CFG_SUB_NEXTCLOUD }}.{{ cluster_config.DOMAIN }}"
          IMMICH_HOST: "{{ cluster_config.CFG_SUB_IMMICH }}.{{ cluster_config.DOMAIN }}"
          ARGOCD_HOST: "{{ cluster_config.CFG_SUB_ARGOCD }}.{{ cluster_config.DOMAIN }}"
          LONGHORN_HOST: "{{ cluster_config.CFG_SUB_LONGHORN }}.{{ cluster_config.DOMAIN }}"
          NAS_IP: "{{ cluster_config.NAS_IP }}"
          NAS_BASE_EXPORT: "{{ cluster_config.NAS_BASE_EXPORT }}"
          NAS_IMMICH_DATA: "{{ cluster_config.NAS_IMMICH_DATA }}"
          NAS_NEXTCLOUD_DATA: "{{ cluster_config.NAS_NEXTCLOUD_DATA }}"
          NAS_BACKUPS_DIR: "{{ cluster_config.NAS_BACKUPS_DIR }}"
          TIMEZONE: "{{ cluster_config.TIMEZONE }}"
        MANIFEST
      register: configmap_manifest
      changed_when: false

    - name: Write ConfigMap manifest to file
      copy:
        content: "{{ configmap_manifest.stdout }}"
        dest: /tmp/configmap-manifest.yaml
      when: configmap_manifest.stdout | length > 0

    - name: Apply cluster-vars ConfigMap
      become: true
      shell: kubectl apply -f /tmp/configmap-manifest.yaml
      environment:
        KUBECONFIG: "{{ kubeconfig_path }}"
      register: configmap_apply
      changed_when: "'configmap' in configmap_apply.stdout.lower()"

    - name: Display ConfigMap application result
      debug:
        msg: "{{ configmap_apply.stdout_lines }}"

    # ────────────────────────────────────────────────────────────────────────────
    # Verify secrets and ConfigMap
    # ────────────────────────────────────────────────────────────────────────────
    - name: Verify secrets were created
      become: true
      shell: |
        kubectl get secrets --all-namespaces -o custom-columns=NAMESPACE:.metadata.namespace,NAME:.metadata.name
      environment:
        KUBECONFIG: "{{ kubeconfig_path }}"
      register: secrets_verify
      changed_when: false

    - name: Display created secrets
      debug:
        msg: |
          Secrets created:
          {{ secrets_verify.stdout }}

    - name: Verify cluster-vars ConfigMap
      become: true
      shell: |
        kubectl get configmap cluster-vars -n argocd -o yaml
      environment:
        KUBECONFIG: "{{ kubeconfig_path }}"
      register: configmap_verify
      changed_when: false

    - name: Display cluster-vars ConfigMap
      debug:
        msg: "{{ configmap_verify.stdout_lines }}"

    - name: Summary
      debug:
        msg: |
          ═══════════════════════════════════════════════════════════════
          Kubernetes Secrets and Configuration Applied
          ═══════════════════════════════════════════════════════════════

          ✓ Created {{ required_namespaces | length }} namespace(s)
          ✓ Applied Kubernetes Secrets from {{ secrets_file_path }}
          ✓ Created cluster-vars ConfigMap in argocd namespace

          The cluster is now configured for ArgoCD deployment:
          1. All secrets are available in their respective namespaces
          2. cluster-vars ConfigMap contains environment substitutions
          3. Ready for ArgoCD and GitOps deployment

          Next step:
          ansible-playbook -i ansible/inventory.ini ansible/argocd.yml

          ═══════════════════════════════════════════════════════════════
