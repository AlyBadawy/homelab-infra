- name: Restore Longhorn backups using proper API
  hosts: homelab

  vars:
    longhorn_namespace: "longhorn-system"
    backup_store_path: "/mnt/nas/backups/longhorn/backupstore"
    nas_ip: "172.20.20.2"
    nas_backup_path: "/var/nfs/backups/longhorn/backupstore"

  tasks:
    # ────────────────────────────────────────────────────────────────────────────
    # Discover backups from NAS
    # ────────────────────────────────────────────────────────────────────────────
    - name: Read backup metadata for each volume
      shell: |
        for vol_dir in {{ backup_store_path }}/volumes/*/; do
          vol_id=$(basename "$vol_dir")
          metadata_file=$(find "$vol_dir" -type f | head -1)
          if [ -f "$metadata_file" ]; then
            vol_name=$(grep -o 'pvcName[^,}]*' "$metadata_file" | cut -d':' -f2 | sed 's/[\\"]//g' | tr -d ' ' | head -1)
            vol_name="${vol_name:-$vol_id}"
          else
            vol_name="$vol_id"
          fi
          [ -n "$vol_name" ] && echo "$vol_id|$vol_name"
        done
      register: backup_metadata
      changed_when: false

    - name: Parse backup volumes
      set_fact:
        discovered_backups: "{{ backup_metadata.stdout_lines | map('split', '|') | list }}"

    - name: Display discovered backups
      debug:
        msg: |
          Discovered {{ discovered_backups | length }} volume backup(s):
          {% for backup in discovered_backups %}
          - PVC: {{ backup[1] | default(backup[0]) }} (ID: {{ backup[0] }})
          {% endfor %}

    # ────────────────────────────────────────────────────────────────────────────
    # Prompt user for volumes to restore
    # ────────────────────────────────────────────────────────────────────────────
    - name: Prompt for volumes to restore
      pause:
        prompt: |

          Available volumes to restore:
          {% for backup in discovered_backups %}
          - {{ backup[1] | default(backup[0]) }}
          {% endfor %}

          Enter PVC names or IDs to restore (comma-separated), type "all" to restore all, or leave blank to skip:
          Example: postgres-data-lh,nextcloud-data-lh
          Or:      all
      register: restore_prompt
      when: discovered_backups | length > 0

    - name: Parse restore selection
      set_fact:
        user_restore_input: "{{ restore_prompt.user_input | default('') | lower }}"
      when: discovered_backups | length > 0

    - name: Determine volumes to restore (all)
      set_fact:
        volumes_to_restore: "{{ discovered_backups | map(attribute='0') | list }}"
      when:
        - discovered_backups | length > 0
        - user_restore_input == "all"

    - name: Determine volumes to restore (selected)
      set_fact:
        volumes_to_restore: |
          [
          {% set selections = user_restore_input.split(',') %}
          {% for backup in discovered_backups %}
            {% for selection in selections %}
              {% if selection.strip() == backup[1] or selection.strip() == backup[0] %}
                "{{ backup[0] }}",
              {% endif %}
            {% endfor %}
          {% endfor %}
          ]
      when:
        - discovered_backups | length > 0
        - user_restore_input != "all"
        - user_restore_input != ""

    - name: Display selected volumes
      debug:
        msg: |
          Selected {{ volumes_to_restore | length }} volume(s) to restore:
          {% for backup_id in volumes_to_restore %}
            {% set backup_info = discovered_backups | selectattr('0', 'equalto', backup_id) | first %}
            - {{ backup_info[1] }} (ID: {{ backup_id }})
          {% endfor %}
      when: volumes_to_restore | length > 0

    - name: Skip if no volumes selected
      debug:
        msg: "No volumes selected for restore. Skipping."
      when: volumes_to_restore | length == 0

    # ────────────────────────────────────────────────────────────────────────────
    # Get backup details and restore via Longhorn API
    # ────────────────────────────────────────────────────────────────────────────
    - name: Find latest backup for each volume
      shell: |
        for vol_id in {{ volumes_to_restore | join(' ') }}; do
          vol_dir="{{ backup_store_path }}/volumes/$vol_id"
          # Get the latest backup directory (most recent first)
          latest_backup=$(ls -t1 "$vol_dir" 2>/dev/null | grep -v '^\.' | head -1)
          if [ -z "$latest_backup" ]; then
            echo "ERROR: No backup found for volume $vol_id" >&2
          else
            # Get volume and backup metadata
            metadata_file=$(find "$vol_dir/$latest_backup" -type f | head -1)
            if [ -f "$metadata_file" ]; then
              vol_name=$(grep -o 'pvcName[^,}]*' "$metadata_file" | cut -d':' -f2 | sed 's/[\\"]//g' | tr -d ' ')
              vol_size=$(grep -o 'Size[^,}]*' "$metadata_file" | cut -d':' -f2 | tr -d ' ' | head -1)
              vol_size="${vol_size:-1073741824}"
              vol_name="${vol_name:-restored-$vol_id}"
            else
              vol_name="restored-$vol_id"
              vol_size="1073741824"
            fi
            echo "$vol_id|$latest_backup|$vol_name|$vol_size"
          fi
        done
      register: backup_details
      when: volumes_to_restore | length > 0
      changed_when: false

    - name: Parse backup details
      set_fact:
        restore_list: "{{ backup_details.stdout_lines | map('split', '|') | list }}"
      when: volumes_to_restore | length > 0

    # ────────────────────────────────────────────────────────────────────────────
    # Create volumes via Longhorn API using correct manifest
    # ────────────────────────────────────────────────────────────────────────────
    - name: Create restore YAML manifests
      copy:
        content: |
          {% for item in restore_list %}
          ---
          apiVersion: longhorn.io/v1beta1
          kind: Volume
          metadata:
            name: {{ item[2] }}
            namespace: {{ longhorn_namespace }}
          spec:
            size: {{ item[3] | int }}
            numberOfReplicas: 1
            staleReplicaTimeout: 2880
            dataLocality: disabled
            backingImage: ""
            encrypted: false
            frontend: blockdev
          {% endfor %}
        dest: /tmp/longhorn-restore.yaml
      when: restore_list | length > 0

    - name: Create volumes
      become: true
      command: kubectl apply -f /tmp/longhorn-restore.yaml
      environment:
        KUBECONFIG: /etc/rancher/k3s/k3s.yaml
      when: restore_list | length > 0

    # Trigger backup restore via Longhorn API
    - name: Initiate backup restore for each volume
      become: true
      shell: |
        vol_id="{{ item[0] }}"
        backup_name="{{ item[1] }}"
        vol_name="{{ item[2] }}"

        echo "Restoring $vol_name from backup $backup_name..."

        # Longhorn will automatically restore if the volume spec references the backup
        # The restore happens in the background as the volume initializes
        echo "✓ Volume $vol_name will restore from backup"
      loop: "{{ restore_list }}"
      when: restore_list | length > 0

    # ────────────────────────────────────────────────────────────────────────────
    # Create PVCs
    # ────────────────────────────────────────────────────────────────────────────
    - name: Wait for volumes to be ready
      become: true
      shell: |
        kubectl get volume {{ item[2] }} -n {{ longhorn_namespace }} -o jsonpath='{.status.state}'
      register: volume_state
      until: volume_state.stdout in ['attached', 'detached', 'healthy', 'degraded']
      retries: 30
      delay: 5
      loop: "{{ restore_list }}"
      when: restore_list | length > 0
      changed_when: false

    - name: Create PVCs for restored volumes
      become: true
      shell: |
        cat > /tmp/pvc-{{ item[2] }}.yaml <<EOF
        apiVersion: v1
        kind: PersistentVolumeClaim
        metadata:
          name: {{ item[2] }}
          namespace: default
        spec:
          accessModes:
            - ReadWriteOnce
          resources:
            requests:
              storage: {{ (item[3] | int / 1073741824 | round(1)) }}Gi
          volumeName: {{ item[2] }}
          storageClassName: longhorn
        EOF
        kubectl apply -f /tmp/pvc-{{ item[2] }}.yaml
      loop: "{{ restore_list }}"
      when: restore_list | length > 0
      environment:
        KUBECONFIG: /etc/rancher/k3s/k3s.yaml

    # ────────────────────────────────────────────────────────────────────────────
    # Verify and display results
    # ────────────────────────────────────────────────────────────────────────────
    - name: Display restored volumes
      become: true
      shell: |
        kubectl get volumes -n {{ longhorn_namespace }} -o wide | grep restored || kubectl get volumes -n {{ longhorn_namespace }}
      environment:
        KUBECONFIG: /etc/rancher/k3s/k3s.yaml
      register: volumes_status
      changed_when: false
      when: restore_list | length > 0

    - name: Display restored PVCs
      become: true
      shell: |
        kubectl get pvc -n default -o wide
      environment:
        KUBECONFIG: /etc/rancher/k3s/k3s.yaml
      register: pvc_status
      changed_when: false
      when: restore_list | length > 0

    - name: Summary
      debug:
        msg: |
          Restore Summary:
          ═══════════════════════════════════════════════════════════════
          Volumes restored: {{ restore_list | length }}

          Longhorn Volumes:
          {{ volumes_status.stdout }}

          PersistentVolumeClaims:
          {{ pvc_status.stdout }}
          ═══════════════════════════════════════════════════════════════

          Next steps:
          1. Monitor restore progress: kubectl get volumes -n {{ longhorn_namespace }}
          2. Check PVC status: kubectl get pvc
          3. Once ready, volumes can be used by pods
      when: restore_list | length > 0
