# =============================================================================
# Pod Disruption Budgets — Ensure zero downtime during updates
# =============================================================================
# PDBs prevent voluntary disruptions (e.g., during ArgoCD syncs)
# ensuring at least minAvailable pods stay running during updates
#

---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: postgres-pdb
  namespace: db
  labels:
    app.kubernetes.io/name: postgres
    homelab/stack: db
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: postgres

