# =============================================================================
# Nextcloud Data Restore Job — One-time restore from backup
# =============================================================================
# Restores nextcloud-data-lh PVC from:
# /mnt/nas/backups/backups-of-volumes/2026-05-21_06-56-57/cloud_nextcloud_config.tar.gz
#
# USAGE:
# 1. Ensure backup file exists on NAS
# 2. Let ArgoCD sync this manifest
# 3. Monitor job: kubectl logs -n cloud job/nextcloud-restore -f
# 4. Once complete and verified, remove this file from the repo to prevent re-running
#
apiVersion: batch/v1
kind: Job
metadata:
  name: nextcloud-restore
  namespace: cloud
  labels:
    app: nextcloud-restore
    homelab/stack: cloud
spec:
  # Don't retry if it fails — likely indicates a real problem
  backoffLimit: 1
  # Keep the completed job for 24 hours for inspection/debugging
  ttlSecondsAfterFinished: 86400
  template:
    metadata:
      labels:
        app: nextcloud-restore
    spec:
      restartPolicy: Never
      containers:
        - name: restore
          image: alpine:3.19
          command:
            - sh
            - -c
            - |
              set -e
              echo "Starting Nextcloud data restore..."
              cd /mnt/data
              echo "Extracting backup tarball..."
              tar -xzf /mnt/backups/cloud_nextcloud_config.tar.gz
              echo "Restore completed successfully"
              ls -lah /mnt/data | head -20
          volumeMounts:
            - name: nextcloud-data
              mountPath: /mnt/data
            - name: backups
              mountPath: /mnt/backups
              readOnly: true
          resources:
            requests:
              cpu: 500m
              memory: 512Mi
            limits:
              cpu: 2000m
              memory: 1Gi
      volumes:
        # Target PVC
        - name: nextcloud-data
          persistentVolumeClaim:
            claimName: nextcloud-data-lh
        # Backup source from NAS
        - name: backups
          hostPath:
            path: /mnt/nas/backups/backups-of-volumes/2026-05-21_06-56-57
            type: Directory
