---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: pvc-backup
  namespace: backup
  labels:
    homelab/stack: backup

---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: secrets-backup-sa
  namespace: backup
  labels:
    homelab/stack: backup

---
# Cluster-wide role: allows the backup CronJob to scale Deployments,
# manage sub-Jobs, and watch Pods across db / auth / cloud / monitor.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: pvc-backup
  labels:
    homelab/stack: backup
rules:
  # Scale deployments down before backup, up after
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "list", "update", "patch"]
  # Watch pods to know when workloads have fully terminated
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch"]
  # Create per-PVC backup Jobs and wait for them
  - apiGroups: ["batch"]
    resources: ["jobs"]
    verbs: ["create", "delete", "get", "list", "watch"]
  # Read Job pod logs on failure
  - apiGroups: [""]
    resources: ["pods/log"]
    verbs: ["get"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: pvc-backup
  labels:
    homelab/stack: backup
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: pvc-backup
subjects:
  - kind: ServiceAccount
    name: pvc-backup
    namespace: backup

---
# Secrets backup ClusterRole — read-only access to all secrets
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: secrets-backup
  labels:
    homelab/stack: backup
rules:
  # Read all secrets across all namespaces
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "list"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: secrets-backup
  labels:
    homelab/stack: backup
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: secrets-backup
subjects:
  - kind: ServiceAccount
    name: secrets-backup-sa
    namespace: backup
