# =============================================================================
# Secrets Backup CronJob — Export all Kubernetes secrets to JSON daily at 3am
# =============================================================================
# Exports all secrets from all namespaces to a timestamped JSON file
# Saved to: /mnt/nas/backups/k3s-secrets/secrets-YYYY-MM-DD-HHMMSS.json
#
# Schedule: Every day at 3:00 AM (0 3 * * *)
#
# USAGE:
# 1. Let ArgoCD sync this manifest
# 2. Monitor: kubectl get cronjob -n backup
# 3. Check recent backups: ls -lah /mnt/nas/backups/k3s-secrets/
# 4. View job logs: kubectl logs -n backup job/secrets-backup-<timestamp> -f
#
apiVersion: batch/v1
kind: CronJob
metadata:
  name: secrets-backup
  namespace: backup
  labels:
    app: secrets-backup
    homelab/stack: backup
spec:
  # Run every day at 3:00 AM
  schedule: "0 3 * * *"
  # Keep last 3 successful and 1 failed job for history
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 1
  jobTemplate:
    spec:
      backoffLimit: 1
      ttlSecondsAfterFinished: 86400
      template:
        metadata:
          labels:
            app: secrets-backup
        spec:
          serviceAccountName: secrets-backup-sa
          restartPolicy: Never
          containers:
            - name: backup
              image: bitnami/kubectl:latest
              command:
                - sh
                - -c
                - |
                  set -e

                  # Create backup directory if it doesn't exist
                  mkdir -p /mnt/nas/backups/k3s-secrets

                  # Generate timestamp
                  TIMESTAMP=$(date +%Y-%m-%d-%H%M%S)
                  BACKUP_FILE="/mnt/nas/backups/k3s-secrets/secrets-${TIMESTAMP}.json"

                  echo "Starting secrets backup..."
                  echo "Backup file: $BACKUP_FILE"

                  # Export all secrets from all namespaces to JSON
                  kubectl get secrets -A -o json > "$BACKUP_FILE"

                  echo "Secrets backup completed successfully"
                  echo "File size: $(du -h $BACKUP_FILE | cut -f1)"
                  echo "Secrets count: $(jq '.items | length' $BACKUP_FILE)"

                  # List recent backups
                  echo ""
                  echo "Recent backups:"
                  ls -lah /mnt/nas/backups/k3s-secrets/ | tail -10
              volumeMounts:
                - name: backups
                  mountPath: /mnt/nas/backups
              resources:
                requests:
                  cpu: 100m
                  memory: 256Mi
                limits:
                  cpu: 500m
                  memory: 512Mi
          volumes:
            - name: backups
              hostPath:
                path: /mnt/nas/backups
                type: Directory
