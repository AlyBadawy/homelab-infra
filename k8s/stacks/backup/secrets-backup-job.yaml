# =============================================================================
# Secrets Backup Job — Export all Kubernetes secrets to JSON
# =============================================================================
# Exports all secrets from all namespaces to a timestamped JSON file
# Saved to: /mnt/nas/backups/k3s-secrets/secrets-YYYY-MM-DD-HHMMSS.json
#
# USAGE:
# 1. Let ArgoCD sync this manifest, or manually run:
#    kubectl apply -f secrets-backup-job.yaml
# 2. Monitor: kubectl logs -n backup job/secrets-backup -f
# 3. Check backup: ls -lah /mnt/nas/backups/k3s-secrets/
#
apiVersion: batch/v1
kind: Job
metadata:
  name: secrets-backup
  namespace: backup
  labels:
    app: secrets-backup
    homelab/stack: backup
spec:
  backoffLimit: 1
  ttlSecondsAfterFinished: 86400
  template:
    metadata:
      labels:
        app: secrets-backup
    spec:
      serviceAccountName: backup-sa
      restartPolicy: Never
      containers:
        - name: backup
          image: bitnami/kubectl:latest
          command:
            - sh
            - -c
            - |
              set -e

              # Create backup directory if it doesn't exist
              mkdir -p /mnt/nas/backups/k3s-secrets

              # Generate timestamp
              TIMESTAMP=$(date +%Y-%m-%d-%H%M%S)
              BACKUP_FILE="/mnt/nas/backups/k3s-secrets/secrets-${TIMESTAMP}.json"

              echo "Starting secrets backup..."
              echo "Backup file: $BACKUP_FILE"

              # Export all secrets from all namespaces to JSON
              kubectl get secrets -A -o json > "$BACKUP_FILE"

              echo "Secrets backup completed successfully"
              echo "File size: $(du -h $BACKUP_FILE | cut -f1)"
              echo "Secrets count: $(jq '.items | length' $BACKUP_FILE)"

              # List recent backups
              echo ""
              echo "Recent backups:"
              ls -lah /mnt/nas/backups/k3s-secrets/ | tail -10
          volumeMounts:
            - name: backups
              mountPath: /mnt/nas/backups
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
      volumes:
        - name: backups
          hostPath:
            path: /mnt/nas/backups
            type: Directory
