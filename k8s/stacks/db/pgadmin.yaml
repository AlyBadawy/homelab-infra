apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: pgadmin-data
  namespace: db
  labels:
    app.kubernetes.io/name: pgadmin
    homelab/stack: db
spec:
  accessModes: [ReadWriteOnce]
  storageClassName: local-path
  resources:
    requests:
      storage: 2Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: pgadmin-data-lh
  namespace: db
  labels:
    app.kubernetes.io/name: pgadmin
    homelab/stack: db
    longhorn.io/pvc-name: pgadmin-data-lh
    longhorn.io/pvc-namespace: db
spec:
  accessModes: [ReadWriteOnce]
  storageClassName: longhorn
  resources:
    requests:
      storage: 2Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: pgadmin
  namespace: db
  labels:
    app.kubernetes.io/name: pgadmin
    homelab/stack: db
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: pgadmin
  template:
    metadata:
      labels:
        app.kubernetes.io/name: pgadmin
    spec:
      initContainers:
        - name: fix-permissions
          image: alpine:3.19
          command: ["sh", "-c", "chown -R 5050:5050 /data"]
          volumeMounts:
            - name: data
              mountPath: /data
      containers:
        - name: pgadmin
          image: dpage/pgadmin4:latest
          ports:
            - containerPort: 80
          envFrom:
            - secretRef:
                name: pgadmin-secret
          volumeMounts:
            - name: data
              mountPath: /var/lib/pgadmin
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 200m
              memory: 256Mi
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: pgadmin-data
---
apiVersion: v1
kind: Service
metadata:
  name: pgadmin
  namespace: db
  labels:
    app.kubernetes.io/name: pgadmin
    homelab/stack: db
spec:
  selector:
    app.kubernetes.io/name: pgadmin
  ports:
    - port: 80
      targetPort: 80
