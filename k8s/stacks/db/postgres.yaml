# =============================================================================
# PostgreSQL — immich-flavoured image with vectorchord + pgvectors extensions
# =============================================================================

# ── PVC ───────────────────────────────────────────────────────────────────────
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgres-data
  namespace: db
  labels:
    app.kubernetes.io/name: postgres
    homelab/stack: db
spec:
  accessModes: [ReadWriteOnce]
  storageClassName: local-path
  resources:
    requests:
      storage: 20Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgres-data-lh
  namespace: db
  labels:
    app.kubernetes.io/name: postgres
    homelab/stack: db
    longhorn.io/pvc-name: postgres-data-lh
    longhorn.io/pvc-namespace: db
spec:
  accessModes: [ReadWriteOnce]
  storageClassName: longhorn
  resources:
    requests:
      storage: 20Gi
---
# ── Deployment ────────────────────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  namespace: db
  labels:
    app.kubernetes.io/name: postgres
    homelab/stack: db
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: postgres
  # RollingUpdate with zero downtime — new pod ready before old terminates
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app.kubernetes.io/name: postgres
    spec:
      terminationGracePeriodSeconds: 30
      # Fix data directory ownership before postgres starts.
      # local-path volumes are provisioned root-owned; postgres (UID 999)
      # requires the data dir to be owned by its own user with mode 0700.
      initContainers:
        - name: fix-permissions
          image: alpine:3.19
          command:
            [
              "sh",
              "-c",
              "chown -R 999:999 /var/lib/postgresql/data && chmod 700 /var/lib/postgresql/data",
            ]
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
          securityContext:
            runAsUser: 0

      containers:
        - name: postgres
          image: ghcr.io/immich-app/postgres:14-vectorchord0.4.3-pgvectors0.2.0@sha256:bcf63357191b76a916ae5eb93464d65c07511da41e3bf7a8416db519b40b1c23
          envFrom:
            - secretRef:
                name: postgres-secret
          env:
            - name: TZ
              value: ${TIMEZONE}
          ports:
            - containerPort: 5432
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
            # Shared memory — matches Docker's shm_size: 256mb
            - name: dshm
              mountPath: /dev/shm
          resources:
            requests:
              cpu: 100m
              memory: 512Mi
            limits:
              cpu: 500m
              memory: 1Gi
          livenessProbe:
            exec:
              command: ["pg_isready", "-U", "postgres"]
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 5
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "postgres"]
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3

      volumes:
        - name: postgres-data
          persistentVolumeClaim:
            claimName: postgres-data-lh
        - name: dshm
          emptyDir:
            medium: Memory
            sizeLimit: 256Mi
---
# ── Service ───────────────────────────────────────────────────────────────────
# Other stacks connect to postgres at: postgres.db.svc.cluster.local:5432
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: db
  labels:
    app.kubernetes.io/name: postgres
    homelab/stack: db
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: postgres
  ports:
    - port: 5432
      targetPort: 5432
