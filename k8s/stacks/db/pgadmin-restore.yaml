# =============================================================================
# pgAdmin Data Restore Job — One-time restore from backup
# =============================================================================
# Restores pgadmin-data-lh PVC from:
# /mnt/nas/backups/backups-of-volumes/2026-05-21_06-56-57/db_pgadmin_data.tar.gz
#
# USAGE:
# 1. Ensure backup file exists on NAS
# 2. Let ArgoCD sync this manifest
# 3. Monitor job: kubectl logs -n db job/pgadmin-restore -f
# 4. Once complete and verified, remove this file from the repo to prevent re-running
#
apiVersion: batch/v1
kind: Job
metadata:
  name: pgadmin-restore
  namespace: db
  labels:
    app: pgadmin-restore
    homelab/stack: db
spec:
  # Don't retry if it fails — likely indicates a real problem
  backoffLimit: 1
  # Keep the completed job for 24 hours for inspection/debugging
  ttlSecondsAfterFinished: 86400
  template:
    metadata:
      labels:
        app: pgadmin-restore
    spec:
      restartPolicy: Never
      # Use a node that has access to the NAS mount
      affinity:
        nodeAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              preference:
                matchExpressions:
                  - key: kubernetes.io/hostname
                    operator: In
                    values: [] # Specify nodes with NAS access if needed
      containers:
        - name: restore
          image: alpine:3.19
          command:
            - sh
            - -c
            - |
              set -e
              echo "Starting pgAdmin data restore..."
              cd /mnt/data
              echo "Extracting backup tarball..."
              tar -xzf /mnt/backups/db_pgadmin_data.tar.gz
              echo "Restore completed successfully"
              ls -lah /mnt/data | head -20
          volumeMounts:
            - name: pgadmin-data
              mountPath: /mnt/data
            - name: backups
              mountPath: /mnt/backups
              readOnly: true
          resources:
            requests:
              cpu: 200m
              memory: 256Mi
            limits:
              cpu: 1000m
              memory: 512Mi
      volumes:
        # Target PVC
        - name: pgadmin-data
          persistentVolumeClaim:
            claimName: pgadmin-data-lh
        # Backup source from NAS
        - name: backups
          hostPath:
            path: /mnt/nas/backups/backups-of-volumes/2026-05-21_06-56-57
            type: Directory
