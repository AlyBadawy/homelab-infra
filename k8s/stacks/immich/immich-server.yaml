apiVersion: apps/v1
kind: Deployment
metadata:
  name: immich-server
  namespace: immich
  labels:
    app.kubernetes.io/name: immich-server
    homelab/stack: immich
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: immich-server
  template:
    metadata:
      labels:
        app.kubernetes.io/name: immich-server
    spec:
      securityContext:
        supplementalGroups: [44, 993]
      containers:
        - name: immich-server
          image: ghcr.io/immich-app/immich-server:release
          ports:
            - containerPort: 2283
          envFrom:
            - secretRef:
                name: immich-secret
          env:
            - name: IMMICH_MACHINE_LEARNING_URL
              value: http://immich-machine-learning.immich.svc.cluster.local:3003
          volumeMounts:
            - name: data
              mountPath: /usr/src/app/upload
            - name: localtime
              mountPath: /etc/localtime
              readOnly: true
            - name: dri
              mountPath: /dev/dri
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 1000m
              memory: 1Gi
          livenessProbe:
            httpGet:
              path: /api/server/ping
              port: 2283
            initialDelaySeconds: 60
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 5
          readinessProbe:
            httpGet:
              path: /api/server/ping
              port: 2283
            initialDelaySeconds: 30
            periodSeconds: 15
            timeoutSeconds: 10
            failureThreshold: 3
      volumes:
        - name: data
          hostPath:
            path: ${NAS_IMMICH_DATA}
            type: Directory
        - name: localtime
          hostPath:
            path: /etc/localtime
            type: File
        - name: dri
          hostPath:
            path: /dev/dri
            type: Directory
---
apiVersion: v1
kind: Service
metadata:
  name: immich-server
  namespace: immich
  labels:
    app.kubernetes.io/name: immich-server
    homelab/stack: immich
spec:
  selector:
    app.kubernetes.io/name: immich-server
  ports:
    - port: 2283
      targetPort: 2283
