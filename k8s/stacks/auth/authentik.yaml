apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: authentik-data
  namespace: auth
  labels:
    app.kubernetes.io/name: authentik
    homelab/stack: auth
spec:
  accessModes: [ReadWriteOnce]
  storageClassName: local-path
  resources:
    requests:
      storage: 5Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: authentik-data-lh
  namespace: auth
  labels:
    app.kubernetes.io/name: authentik
    homelab/stack: auth
    longhorn.io/pvc-name: authentik-data-lh
    longhorn.io/pvc-namespace: auth
spec:
  accessModes: [ReadWriteOnce]
  storageClassName: longhorn
  resources:
    requests:
      storage: 5Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: authentik-templates
  namespace: auth
  labels:
    app.kubernetes.io/name: authentik
    homelab/stack: auth
spec:
  accessModes: [ReadWriteOnce]
  storageClassName: local-path
  resources:
    requests:
      storage: 1Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: authentik-templates-lh
  namespace: auth
  labels:
    app.kubernetes.io/name: authentik
    homelab/stack: auth
    longhorn.io/pvc-name: authentik-templates-lh
    longhorn.io/pvc-namespace: auth
spec:
  accessModes: [ReadWriteOnce]
  storageClassName: longhorn
  resources:
    requests:
      storage: 1Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: authentik-server
  namespace: auth
  labels:
    app.kubernetes.io/name: authentik
    app.kubernetes.io/component: server
    homelab/stack: auth
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: authentik
      app.kubernetes.io/component: server
  template:
    metadata:
      labels:
        app.kubernetes.io/name: authentik
        app.kubernetes.io/component: server
    spec:
      containers:
        - name: authentik
          image: ghcr.io/goauthentik/server:2026.2.2
          args: ["server"]
          ports:
            - containerPort: 9000
            - containerPort: 9443
          envFrom:
            - secretRef:
                name: authentik-secret
          volumeMounts:
            - name: data
              mountPath: /media
            - name: templates
              mountPath: /templates
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          readinessProbe:
            httpGet:
              path: /-/health/ready/
              port: 9000
            initialDelaySeconds: 30
            periodSeconds: 10
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: authentik-data-lh
        - name: templates
          persistentVolumeClaim:
            claimName: authentik-templates-lh
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: authentik-worker
  namespace: auth
  labels:
    app.kubernetes.io/name: authentik
    app.kubernetes.io/component: worker
    homelab/stack: auth
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: authentik
      app.kubernetes.io/component: worker
  template:
    metadata:
      labels:
        app.kubernetes.io/name: authentik
        app.kubernetes.io/component: worker
    spec:
      securityContext:
        runAsUser: 0
      containers:
        - name: authentik
          image: ghcr.io/goauthentik/server:2026.2.2
          args: ["worker"]
          envFrom:
            - secretRef:
                name: authentik-secret
          volumeMounts:
            - name: data
              mountPath: /media
            - name: templates
              mountPath: /templates
          resources:
            requests:
              cpu: 50m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: authentik-data-lh
        - name: templates
          persistentVolumeClaim:
            claimName: authentik-templates-lh
---
apiVersion: v1
kind: Service
metadata:
  name: authentik-server
  namespace: auth
  labels:
    app.kubernetes.io/name: authentik
    homelab/stack: auth
spec:
  selector:
    app.kubernetes.io/name: authentik
    app.kubernetes.io/component: server
  ports:
    - name: http
      port: 9000
      targetPort: 9000
    - name: https
      port: 9443
      targetPort: 9443
