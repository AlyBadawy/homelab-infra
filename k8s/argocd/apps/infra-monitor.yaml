apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: infra-monitor
  namespace: argocd
  labels:
    homelab/stack: infrastructure
  annotations:
    # Wave 2: alongside Longhorn config; monitor doesn't depend on Longhorn being healthy
    argocd.argoproj.io/sync-wave: "2"
spec:
  project: default
  sources:
    - repoURL: https://prometheus-community.github.io/helm-charts
      chart: kube-prometheus-stack
      targetRevision: "*"
      helm:
        releaseName: prometheus
        valueFiles:
          - $values/k8s/stacks/monitor/helm-values.yaml
    - repoURL: ${GITHUB_REPO}
      targetRevision: main
      ref: values
  destination:
    server: https://kubernetes.default.svc
    namespace: monitor
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
