apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: argocd-ingress
  namespace: argocd
  labels:
    homelab/stack: argocd
  annotations:
    # Wave 1: deploy after ingress-nginx (wave 0) is ready
    argocd.argoproj.io/sync-wave: "1"
spec:
  project: default
  source:
    repoURL: ${GITHUB_REPO}
    path: k8s/argocd
    plugin:
      name: kustomize-envsubst
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
