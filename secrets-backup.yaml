metadata:
  description: Homelab Infrastructure - Secrets and Configuration Backup
  date: '1779936273.2369304'
  note: This file contains references to all secrets, configuration, and environment
    variables. Store securely.
cluster_configuration:
  DOMAIN: '{{ domain }}'
  GITHUB_REPO: '{{ github_repo | default('''') }}'
  NAS_IP: '{{ nas_ip | default(''172.20.20.2'') }}'
  NAS_BASE_EXPORT: '{{ nas_base_export | default(''/var/nfs/shared'') }}'
  NAS_IMMICH_DATA: '{{ nas_immich_data | default('''') }}'
  NAS_NEXTCLOUD_DATA: '{{ nas_nextcloud_data | default('''') }}'
  NAS_BACKUPS_DIR: '{{ nas_backups_dir | default('''') }}'
  TIMEZONE: '{{ timezone | default(''UTC'') }}'
  CFG_SUB_WHOAMI: '{{ sub_whoami | default(''whoami'') }}'
  CFG_SUB_GRAFANA: '{{ sub_grafana | default(''grafana'') }}'
  CFG_SUB_PROMETHEUS: '{{ sub_prometheus | default(''prometheus'') }}'
  CFG_SUB_ALERTMANAGER: '{{ sub_alertmanager | default(''alerts'') }}'
  CFG_SUB_PGADMIN: '{{ sub_pgadmin | default(''pgadmin'') }}'
  CFG_SUB_AUTHENTIK: '{{ sub_authentik | default(''auth'') }}'
  CFG_SUB_NEXTCLOUD: '{{ sub_nextcloud | default(''cloud'') }}'
  CFG_SUB_IMMICH: '{{ sub_immich | default(''photos'') }}'
  CFG_SUB_ARGOCD: '{{ sub_argocd | default(''argocd'') }}'
  CFG_SUB_LONGHORN: '{{ sub_longhorn | default(''longhorn'') }}'
environment_variables:
  IMMICH_MACHINE_LEARNING_URL:
  - name: IMMICH_MACHINE_LEARNING_URL
    file: k8s/stacks/immich/immich-server.yaml
    namespace: immich
    value: http://immich-machine-learning.immich.svc.cluster.local:3003
  IMMICH_MACHINE_LEARNING_WORKERS:
  - name: IMMICH_MACHINE_LEARNING_WORKERS
    file: k8s/stacks/immich/immich-ml.yaml
    namespace: immich
    value: '2'
  TRANSFORMERS_BACKEND:
  - name: TRANSFORMERS_BACKEND
    file: k8s/stacks/immich/immich-ml.yaml
    namespace: immich
    value: openvino
  OPENVINO_DEVICE:
  - name: OPENVINO_DEVICE
    file: k8s/stacks/immich/immich-ml.yaml
    namespace: immich
    value: GPU
  PUID:
  - name: PUID
    file: k8s/stacks/cloud/nextcloud.yaml
    namespace: cloud
    value: '1000'
  PGID:
  - name: PGID
    file: k8s/stacks/cloud/nextcloud.yaml
    namespace: cloud
    value: '1000'
  TZ:
  - name: TZ
    file: k8s/stacks/cloud/nextcloud.yaml
    namespace: cloud
    value: ${TIMEZONE}
  - name: TZ
    file: k8s/stacks/db/postgres.yaml
    namespace: db
    value: ${TIMEZONE}
  DB_TYPE:
  - name: DB_TYPE
    file: k8s/stacks/cloud/nextcloud.yaml
    namespace: cloud
    value: pgsql
  DB_HOST:
  - name: DB_HOST
    file: k8s/stacks/cloud/nextcloud.yaml
    namespace: cloud
    value: postgres.db.svc.cluster.local
  DB_NAME:
  - name: DB_NAME
    file: k8s/stacks/cloud/nextcloud.yaml
    namespace: cloud
    secretRef:
      name: nextcloud-secret
      key: DB_NAME
  DB_USER:
  - name: DB_USER
    file: k8s/stacks/cloud/nextcloud.yaml
    namespace: cloud
    secretRef:
      name: nextcloud-secret
      key: DB_USER
  DB_PASS:
  - name: DB_PASS
    file: k8s/stacks/cloud/nextcloud.yaml
    namespace: cloud
    secretRef:
      name: nextcloud-secret
      key: DB_PASS
secrets:
  nextcloud-secret:
  - namespace: cloud
    requiredKey: DB_NAME
    usedBy: nextcloud (Deployment)
    file: k8s/stacks/cloud/nextcloud.yaml
    source: reference
  - namespace: cloud
    requiredKey: DB_USER
    usedBy: nextcloud (Deployment)
    file: k8s/stacks/cloud/nextcloud.yaml
    source: reference
  - namespace: cloud
    requiredKey: DB_PASS
    usedBy: nextcloud (Deployment)
    file: k8s/stacks/cloud/nextcloud.yaml
    source: reference
configmaps:
  backup-script:
  - namespace: backup
    keys:
    - backup.sh
    file: k8s/stacks/backup/script-configmap.yaml
    source: manifest
  backup-config:
  - namespace: backup
    keys:
    - BACKUPS_DIR
    file: k8s/stacks/backup/backup-config.yaml
    source: manifest
  argocd-cmp-kustomize-envsubst:
  - namespace: argocd
    keys:
    - plugin.yaml
    file: k8s/argocd/cmp-plugin.yaml
    source: manifest
ansible_variables:
  k3s.yml:
    k3s_version: ''
    helm_version: ''
    longhorn_version: ''
    longhorn_namespace: longhorn-system
  dependencies.yml:
    required_packages:
    - curl
    - git
    - nfs-common
    - python3
    - python3-pip
    - python3-yaml
    - gettext-base
    - open-iscsi
    - jq
    - cron
  pre-create-pvcs.yml:
    github_repo: https://github.com/AlyBadawy/homelab-infra
    manifests_dir: /tmp/homelab-manifests
    pvc_script: /tmp/extract-pvcs.py
    backup_store_path: /mnt/nas/backups/k3s-longhorn/backupstore/volumes
    kubeconfig_path: /etc/rancher/k3s/k3s.yaml
    pvc_files:
    - path: k8s/stacks/db/postgres.yaml
      namespace: db
      backup_name: postgres-data-lh
      size: 21474836480
    - path: k8s/stacks/db/pgadmin.yaml
      namespace: db
      backup_name: pgadmin-data-lh
      size: 2147483648
    - path: k8s/stacks/auth/authentik.yaml
      namespace: auth
      backup_name: authentik-data-lh
      size: 2147483648
    - path: k8s/stacks/cloud/nextcloud.yaml
      namespace: cloud
      backup_name: nextcloud-data-lh
      size: 10737418240
  swap.yml:
    swap_size_gb: 12
  argocd-bootstrap.yml:
    kubeconfig_path: /etc/rancher/k3s/k3s.yaml
    argocd_namespace: argocd
    root_app_path: '{{ playbook_dir }}/../k8s/argocd/root-app.yaml'
    cmp_plugin_path: '{{ playbook_dir }}/../k8s/argocd/cmp-plugin.yaml'
    helm_values_path: '{{ playbook_dir }}/../k8s/argocd/helm-values.yaml'
  restore-all-backups.yml:
    kubeconfig_path: /etc/rancher/k3s/k3s.yaml
  apply-secrets.yml:
    secrets_file_path: /mnt/nas/homelab/secrets.yaml
    kubeconfig_path: /etc/rancher/k3s/k3s.yaml
    longhorn_namespace: longhorn-system
    domain: in.alybadawy.com
    cluster_config:
      DOMAIN: '{{ domain }}'
      GITHUB_REPO: '{{ github_repo | default('''') }}'
      NAS_IP: '{{ nas_ip | default(''172.20.20.2'') }}'
      NAS_BASE_EXPORT: '{{ nas_base_export | default(''/var/nfs/shared'') }}'
      NAS_IMMICH_DATA: '{{ nas_immich_data | default('''') }}'
      NAS_NEXTCLOUD_DATA: '{{ nas_nextcloud_data | default('''') }}'
      NAS_BACKUPS_DIR: '{{ nas_backups_dir | default('''') }}'
      TIMEZONE: '{{ timezone | default(''UTC'') }}'
      CFG_SUB_WHOAMI: '{{ sub_whoami | default(''whoami'') }}'
      CFG_SUB_GRAFANA: '{{ sub_grafana | default(''grafana'') }}'
      CFG_SUB_PROMETHEUS: '{{ sub_prometheus | default(''prometheus'') }}'
      CFG_SUB_ALERTMANAGER: '{{ sub_alertmanager | default(''alerts'') }}'
      CFG_SUB_PGADMIN: '{{ sub_pgadmin | default(''pgadmin'') }}'
      CFG_SUB_AUTHENTIK: '{{ sub_authentik | default(''auth'') }}'
      CFG_SUB_NEXTCLOUD: '{{ sub_nextcloud | default(''cloud'') }}'
      CFG_SUB_IMMICH: '{{ sub_immich | default(''photos'') }}'
      CFG_SUB_ARGOCD: '{{ sub_argocd | default(''argocd'') }}'
      CFG_SUB_LONGHORN: '{{ sub_longhorn | default(''longhorn'') }}'
  nfs-mounts.yml:
    nas_ip: 172.20.20.2
    nfs_opts: nfsvers=3,defaults,_netdev,nofail,x-systemd.automount,x-systemd.mount-timeout=10
    nfs_mounts:
    - nfs_path: /var/nfs/shared/homelab
      mount_point: /mnt/nas/homelab
    - nfs_path: /var/nfs/shared/immich
      mount_point: /mnt/nas/immich
    - nfs_path: /var/nfs/shared/nextcloud
      mount_point: /mnt/nas/nextcloud
    - nfs_path: /var/nfs/shared/backups
      mount_point: /mnt/nas/backups
  acme-cert.yml:
    kubeconfig_path: /etc/rancher/k3s/k3s.yaml
    domain: in.alybadawy.com
    acme_home: '{{ ansible_env.HOME }}/.acme.sh'
    acme_conf: '{{ acme_home }}/account.conf'
    cert_secret_name: wildcard-in-alybadawy-com
    ingress_namespace: ingress-nginx
    nas_certs_dir: /mnt/nas/homelab/certs
    vercel_api_token: '{{ vercel_api_token | default('''') }}'
    acme_email: '{{ acme_email | default(''admin@in.alybadawy.com'') }}'
  create-pvcs-from-volumes.yml:
    kubeconfig_path: /etc/rancher/k3s/k3s.yaml
  longhorn-bootstrap.yml:
    longhorn_namespace: longhorn-system
    longhorn_version: ~1.7.0
    longhorn_helm_repo: https://charts.longhorn.io
    longhorn_values_file: /tmp/longhorn-helm-values.yaml
    nas_mount_path: /mnt/nas/backups
    longhorn_backup_path: k3s-longhorn
    nas_ip: 172.20.20.2
    nas_base_export: /var/nfs/shared/backups
instructions:
  secrets_storage: Secrets are stored in /mnt/nas/homelab/secrets.yaml on the NAS
  apply_command: ansible-playbook -i ansible/inventory.ini ansible/apply-secrets.yml
  restore_warning: Before rebuilding, ensure /mnt/nas/homelab/secrets.yaml is backed
    up

